name: Build KB (Lean, High-Signal)

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: kb-${{ github.ref }}
  cancel-in-progress: true

env:
  # Jira configuration (use HPCC4J project)
  JIRA_BASE_URL: https://hpccsystems.atlassian.net
  JIRA_JQL: "project=HPCC4J AND (statusCategory in ('To Do','In Progress') OR (statusCategory = Done AND updated >= -365d)) ORDER BY updated DESC"
  JIRA_PAGE_SIZE: '100'
  # Source URL base used by the enhanced chunker for provenance
  KB_SOURCE_BASE_URL: https://github.com/rpastrana/HPCC4J/blob/master

jobs:
  build-kb:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      # -----------------------------------------------------------------------
      # Repo & scripts
      # -----------------------------------------------------------------------
      - name: Checkout repository (scripts & configuration)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure helper scripts are executable
        run: |
          set -euo pipefail
          chmod +x .github/scripts/convert_any_to_md.py || true
          chmod +x .github/scripts/jira_to_kb.py || true
          chmod +x .github/scripts/kb-source-markdow-chunk.py || true

      # -----------------------------------------------------------------------
      # Upstream sources: prefer candidate-9.12.x; fallback to master
      # -----------------------------------------------------------------------
      - name: Checkout upstream repo (hpcc-systems/hpcc4j) 
        uses: actions/checkout@v4
        with:
          repository: hpcc-systems/hpcc4j
          ref: master
          path: upstream
          fetch-depth: 1

      - name: Switch to candidate-9.12.x if available (fallback-safe)
        run: |
          set -euo pipefail
          git -C upstream remote set-branches --add origin candidate-9.12.x || true
          git -C upstream fetch origin candidate-9.12.x --depth=1 || true

          if git -C upstream show-ref --verify --quiet refs/remotes/origin/candidate-9.12.x; then
            git -C upstream checkout -q -B candidate-9.12.x origin/candidate-9.12.x
            echo "Using hpcc-systems/hpcc4j@candidate-9.12.x"
          else
            echo "::warning::hpcc-systems/hpcc4j does not have 'candidate-9.12.x'; continuing on 'master'."
          fi

          echo "Upstream revision: $(git -C upstream rev-parse --short HEAD)"

      - name: Checkout upstream Wiki (hpcc-systems/hpcc4j.wiki)
        uses: actions/checkout@v4
        with:
          repository: hpcc-systems/hpcc4j.wiki
          ref: master
          path: upstream-wiki

      # -----------------------------------------------------------------------
      # Curate high-signal inputs into kb/
      # -----------------------------------------------------------------------
      - name: Stage curated docs
        run: |
          set -euo pipefail
          mkdir -p kb/topics/howto kb/topics/project-docs kb/topics/connectors-spark-hpcc kb/topics/issues-roadmap

          # Project docs (high-signal)
          for f in upstream/README.md upstream/MIGRATION-*.md upstream/CodeArchitectureAnalysis.md; do
            [ -f "$f" ] || continue
            cp "$f" "kb/topics/project-docs/$(basename "$f")"
          done

          # Wiki → howto (preserve structure)
          if [ -d upstream-wiki ]; then
            shopt -s globstar nullglob
            for f in upstream-wiki/**/*.md; do
              rel="${f#upstream-wiki/}"
              dest="kb/topics/howto/${rel}"
              mkdir -p "$(dirname "$dest")"
              cp "$f" "$dest"
            done
          fi

          # Notebook (from current upstream checkout)
          if [ -f upstream/spark-hpcc/Examples/PySparkExample.ipynb ]; then
            cp upstream/spark-hpcc/Examples/PySparkExample.ipynb \
               "kb/topics/connectors-spark-hpcc/PySparkExample.ipynb"
          fi

      # -----------------------------------------------------------------------
      # Python 3.11 (shared)
      # -----------------------------------------------------------------------
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------------------------------------------------
      # Generic "any file → Markdown" conversion (externalized, fallback-safe)
      # -----------------------------------------------------------------------
      - name: Install generic converters (best-effort)
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          # Install what we may use; failures are OK (the script will stub if missing)
          pip install nbformat nbconvert beautifulsoup4 pdfminer.six python-docx || true

      - name: Convert any file → Markdown (generic)
        run: |
          set -euo pipefail
          python .github/scripts/convert_any_to_md.py \
            --root kb \
            --out-root kb \
            --remove-source \
            --exclude "topics/tests-*/**" "*/node_modules/**" \
            --skip-binaries \
            --preview 0

      # -----------------------------------------------------------------------
      # Jira digest (single-file report, POST /search/jql via script)
      # -----------------------------------------------------------------------
      - name: Install Jira script dependencies
        run: |
          set -euo pipefail
          pip install requests python-slugify

      - name: Fetch Jira issues into KB (single-file digest + debug)
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p 'kb/topics/issues-roadmap' logs

          if [ -z "${JIRA_EMAIL:-}" ] || [ -z "${JIRA_API_TOKEN:-}" ]; then
            echo "Jira secrets not configured; skipping Jira sync."
            exit 0
          fi

          python .github/scripts/jira_to_kb.py \
            --base "${JIRA_BASE_URL}" \
            --auth "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            --jql "${JIRA_JQL}" \
            --limit "${JIRA_PAGE_SIZE}" \
            --out 'kb/topics/issues-roadmap' \
            --single-file 'jira-digest.md' \
            --digest-title "HPCC4J Jira Digest" \
            --digest-top 20 \
            --debug | tee logs/jira_fetch_debug.log

          status=${PIPESTATUS[0]}
          echo "jira_to_kb.py exit code: ${status}"
          if [ "${status}" -ne 0 ]; then
            exit "${status}"
          fi

          echo "Digest head:"
          head -n 30 'kb/topics/issues-roadmap/jira-digest.md' || true

      - name: Upload Jira debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jira-debug-log
          path: logs/jira_fetch_debug.log
          if-no-files-found: ignore
          retention-days: 7

      # -----------------------------------------------------------------------
      # Content hygiene before chunking (Markdown lint & link check)
      # -----------------------------------------------------------------------
      - name: Content hygiene (Markdown lint & link check)
        run: |
          set -euo pipefail
          if ! command -v node >/dev/null 2>&1; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi
          # Normalize common Markdown issues in-place
          npx -y markdownlint-cli2-fix "kb/**/*.md" || true
          # Link check (tolerate flaky externals with retry)
          npx -y lychee --no-progress --max-redirects 5 --timeout 20s --retry 1 \
            --exclude "https://localhost|http://127.0.0.1" \
            "kb/**/*.md" || true

      # -----------------------------------------------------------------------
      # Enhanced chunking (primary artifact)
      # -----------------------------------------------------------------------
      - name: Install chunker dependencies
        run: |
          set -euo pipefail
          pip install pyyaml

      - name: Enhanced chunking & metadata (Markdown-aware)
        env:
          KB_ROOT: kb
          OUT_DIR: .kb_index_enhanced
          KB_SOURCE_BASE_URL: ${{ env.KB_SOURCE_BASE_URL }}
        run: |
          set -euo pipefail
          python .github/scripts/kb-source-markdow-chunk.py \
            --kb-root "${KB_ROOT}" \
            --out-dir "${OUT_DIR}" \
            --source-base "${KB_SOURCE_BASE_URL}" \
            --max-chars 2400 \
            --overlap 300 \
            --ext .md .txt \
            --topics-map .github/scripts/hpcc4j-topics-to-kb-map.yml
            # (Optional once supported by your chunker)
            # --exclude "topics/tests-*/**" --prepend-section-path

      - name: Upload raw KB (curated Markdown)
        uses: actions/upload-artifact@v4
        with:
          name: kb-sources
          path: kb/**
          retention-days: 14

      - name: Upload enhanced KB index artifact
        uses: actions/upload-artifact@v4
        with:
          name: kb-index-enhanced
          path: ./.kb_index_enhanced/**
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

      # -----------------------------------------------------------------------
      # Lightweight KB quality report
      # -----------------------------------------------------------------------
      - name: Build KB quality report
        run: |
          set -euo pipefail
          mkdir -p dist
          {
            echo "## KB Quality Summary"
            echo "- Date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "- Source Markdown files: $(find kb -type f -name '*.md' | wc -l | xargs)"
            echo "- Enhanced chunks (lines in index.jsonl): $(wc -l < .kb_index_enhanced/index.jsonl)"
            if command -v jq >/dev/null 2>&1; then
              AVG=$(jq -s 'map(.tokens_estimate) | (add / length)' .kb_index_enhanced/index.jsonl 2>/dev/null || echo "n/a")
              echo "- Avg tokens per chunk: ${AVG}"
            fi
          } > dist/kb-quality-report.md

      - name: Upload KB quality report
        uses: actions/upload-artifact@v4
        with:
          name: kb-quality-report
          path: dist/kb-quality-report.md
          if-no-files-found: error
          retention-days: 14
name: Java Format Check

on:
  workflow_call:
    inputs:
      head_sha:
        description: 'Head SHA to check out'
        required: true
        type: string

permissions:
  contents: read

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.head_sha }}
        fetch-depth: 0

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: 8
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-jdk8-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2-jdk8

    - name: Check Java code formatting with Eclipse formatter
      run: |
        chmod +x scripts/check-format-eclipse.sh
        echo "::group::Format Check Results"
        if scripts/check-format-eclipse.sh origin/master; then
          echo "✅ All files properly formatted!"
        else
          echo "::error::Formatting violations found"
          echo ""
          echo "::notice::To fix formatting issues, run: mvn net.revelc.code.formatter:formatter-maven-plugin:format"
          echo "::notice::Or use your IDE's formatter with the Eclipse configuration in eclipse/HPCC-JAVA-Formatter.xml"
          exit 1
        fi
        echo "::endgroup::"